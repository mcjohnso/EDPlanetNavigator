name: Test

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile-check the plugin modules
        run: >-
          python -m py_compile
          EDPlanetNavigator/load.py
          EDPlanetNavigator/edpn_navigation.py
          EDPlanetNavigator/edpn_overlay.py

      - name: Run navigation self-test
        run: python EDPlanetNavigator/edpn_navigation.py
